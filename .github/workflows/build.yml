name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: |
          python -m PyInstaller `
            --noconfirm `
            --onefile `
            --windowed `
            --name "GSTR2BRecon" `
            --distpath . `
            --paths python `
            --add-data "ui.html;." `
            --collect-all rapidfuzz `
            --collect-all pandas `
            --collect-all openpyxl `
            --collect-all webview `
            python\app.py

      - name: Get short SHA
        id: sha
        run: echo "short=$('${{ github.sha }}'.Substring(0,7))" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GSTR2BRecon-${{ steps.sha.outputs.short }}
          path: GSTR2BRecon.exe
          retention-days: 90

      - name: Create / update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Auto-built from commit ${{ github.sha }} on `${{ github.ref_name }}`.

            **Download `GSTR2BRecon.exe` below — no Python or anything else needed, just double-click.**
          files: GSTR2BRecon.exe
          prerelease: false
          make_latest: true
